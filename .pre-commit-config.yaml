# Hooks run ruff from the uv-locked dev group, so the ruff version always
# matches uv.lock (CI uses --locked, hooks use --frozen; both pin the version).
# Requires uv on PATH; run `uv run pre-commit install` once.
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff check
        entry: uv run --frozen --only-group dev ruff check --fix
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff format
        entry: uv run --frozen --only-group dev ruff format
        language: system
        types_or: [python, pyi]
        require_serial: true
