blueprint:
  name: "Better Thermostat: Notify when heating starts"
  description: >
    Sends a notification whenever a Better Thermostat device switches its
    hvac_action to "heating". Useful for monitoring unexpected heating cycles
    or tracking energy consumption.
  domain: automation
  source_url: https://github.com/KartoffelToby/better_thermostat/blob/master/blueprints/heating_active_notify.yaml
  input:
    thermostat_device:
      name: Better Thermostat device
      description: The Better Thermostat device to monitor.
      selector:
        device:
          integration: better_thermostat

    notify_target:
      name: Notification target
      description: >
        The notification service to call, e.g. `notify.mobile_app_my_phone`
        or `notify.notify` for the default notifier.
      default: notify.notify
      selector:
        text: {}

    message:
      name: Message
      description: Notification message body.
      default: "🔥 {{ device_attr(trigger.device_id, 'name') }} started heating."
      selector:
        text:
          multiline: true

mode: single
max_exceeded: silent

trigger:
  - platform: device
    domain: better_thermostat
    device_id: !input thermostat_device
    type: heating_active

condition: []

action:
  - service: !input notify_target
    data:
      title: "Better Thermostat – Heating started"
      message: !input message
