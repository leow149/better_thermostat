blueprint:
  name: "Better Thermostat: Pause heating when window opens"
  description: >
    Automatically turns the thermostat off (or to a frost-protection temperature)
    when a window opens, and resumes normal mode when the window closes again.
    Uses Better Thermostat's built-in window_opened / window_closed device triggers.
  domain: automation
  source_url: https://github.com/KartoffelToby/better_thermostat/blob/master/blueprints/window_heating_control.yaml
  input:
    thermostat_device:
      name: Better Thermostat device
      description: The Better Thermostat device to control.
      selector:
        device:
          integration: better_thermostat

    thermostat_entity:
      name: Better Thermostat climate entity
      description: >
        The climate entity belonging to the device above. Used to set
        temperatures and restore the HVAC mode.
      selector:
        entity:
          integration: better_thermostat
          domain: climate

    open_delay:
      name: Delay before turning off (seconds)
      description: >
        Wait this long after the window opens before taking action.
        Prevents short accidental presses from killing the heating.
      default: 30
      selector:
        number:
          min: 0
          max: 300
          step: 5
          unit_of_measurement: s

    frost_temp:
      name: Frost-protection temperature (°C)
      description: >
        Temperature to set while the window is open. Set to 0 to turn the
        thermostat completely off instead.
      default: 12
      selector:
        number:
          min: 0
          max: 18
          step: 0.5
          unit_of_measurement: °C

    notify_target:
      name: Notification target (optional)
      description: Receive a message when the window opens or closes. Leave empty to skip.
      default: ""
      selector:
        text: {}

mode: restart
max_exceeded: silent

variables:
  frost_temp: !input frost_temp
  notify_target: !input notify_target

trigger:
  - platform: device
    domain: better_thermostat
    device_id: !input thermostat_device
    type: window_opened
    id: opened

  - platform: device
    domain: better_thermostat
    device_id: !input thermostat_device
    type: window_closed
    id: closed

condition: []

action:
  - choose:
      # ── Window opened ──────────────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: opened
        sequence:
          - delay:
              seconds: !input open_delay

          - if:
              - condition: template
                value_template: "{{ frost_temp == 0 }}"
            then:
              - service: climate.turn_off
                target:
                  entity_id: !input thermostat_entity
            else:
              - service: climate.set_temperature
                target:
                  entity_id: !input thermostat_entity
                data:
                  temperature: "{{ frost_temp }}"

          - if:
              - condition: template
                value_template: "{{ notify_target != '' }}"
            then:
              - service: !input notify_target
                data:
                  title: "Better Thermostat – Window open"
                  message: >
                    🪟 Window opened – {{ device_attr(trigger.device_id, 'name') }}
                    paused{% if frost_temp > 0 %} at {{ frost_temp }}°C frost
                    protection{% endif %}.

      # ── Window closed ──────────────────────────────────────────────────────
      - conditions:
          - condition: trigger
            id: closed
        sequence:
          - service: climate.turn_on
            target:
              entity_id: !input thermostat_entity

          - if:
              - condition: template
                value_template: "{{ notify_target != '' }}"
            then:
              - service: !input notify_target
                data:
                  title: "Better Thermostat – Window closed"
                  message: >
                    ✅ Window closed – {{ device_attr(trigger.device_id, 'name') }}
                    resumed normal heating.
